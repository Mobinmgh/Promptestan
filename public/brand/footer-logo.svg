<svg width="460" height="116" viewBox="0 0 460 116" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Promptestan Footer Logo</title>
  <desc id="desc">Horizontal Promptestan footer logo with Persian wordmark and visual prompt mark.</desc>
  <defs>
    <linearGradient id="markBg" x1="10" y1="9" x2="98" y2="103" gradientUnits="userSpaceOnUse">
      <stop stop-color="#262626"/>
      <stop offset="0.55" stop-color="#151515"/>
      <stop offset="1" stop-color="#0F0F17"/>
    </linearGradient>
    <linearGradient id="accent" x1="15" y1="11" x2="104" y2="107" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <g transform="translate(350 10)">
    <rect width="96" height="96" rx="23" fill="url(#markBg)"/>
    <rect width="96" height="96" rx="23" stroke="url(#accent)" stroke-width="3"/>
    <rect x="22" y="22" width="52" height="39" rx="10" fill="#111111" stroke="url(#accent)" stroke-width="3"/>
    <path d="M30 53L40 43L51 54L58 47L70 58" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="64" cy="35" r="4.5" fill="#8B5CF6"/>
    <text x="48" y="82" text-anchor="middle" font-size="39" font-weight="900" font-family="Vazirmatn, IRANSansX, Tahoma, Arial, sans-serif" fill="#F5F5F5">پ</text>
  </g>

  <text x="330" y="48" text-anchor="end" font-size="32" font-weight="900" font-family="Vazirmatn, IRANSansX, Tahoma, Arial, sans-serif" fill="#F5F5F5">پرامپتستان</text>
  <text x="330" y="76" text-anchor="end" font-size="15" font-weight="500" font-family="Vazirmatn, IRANSansX, Tahoma, Arial, sans-serif" fill="#A3A3A3">گالری پرامپت‌های تصویری آماده</text>
  <path d="M72 96H330" stroke="#343434" stroke-width="2" stroke-linecap="round"/>
  <path d="M226 96H330" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>
</svg>
