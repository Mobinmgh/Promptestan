<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Promptestan Logo Mark</title>
  <desc id="desc">Metallic letter P with blue circuit detail.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0" stop-color="#FBF8F5"/>
      <stop offset="0.72" stop-color="#F2EDE8"/>
      <stop offset="1" stop-color="#E8E0D8"/>
    </radialGradient>
    <linearGradient id="metal" x1="40" y1="22" x2="118" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="0.16" stop-color="#BFC7CF"/>
      <stop offset="0.34" stop-color="#F4F7FA"/>
      <stop offset="0.52" stop-color="#7D8994"/>
      <stop offset="0.74" stop-color="#DCE3EA"/>
      <stop offset="1" stop-color="#48525C"/>
    </linearGradient>
    <linearGradient id="edge" x1="44" y1="18" x2="118" y2="142" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.45" stop-color="#6B7A88"/>
      <stop offset="1" stop-color="#1F2933"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="200" height="200" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1F2937" flood-opacity="0.20"/>
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#60A5FA" flood-opacity="0.28"/>
    </filter>
    <filter id="blueGlow" x="0" y="0" width="160" height="160" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#38BDF8" flood-opacity="0.9"/>
    </filter>
  </defs>

  <rect width="160" height="160" rx="34" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <text x="80" y="123" text-anchor="middle" font-size="118" font-weight="800" font-family="Georgia, 'Times New Roman', serif" fill="url(#metal)" stroke="url(#edge)" stroke-width="1.7">P</text>
    <path d="M60 58V77L76 93V115" stroke="#4B5563" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.72"/>
    <path d="M55 73L86 104" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" filter="url(#blueGlow)"/>
    <path d="M65 84L76 95" stroke="#E0F2FE" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="60" cy="58" r="4.2" fill="#F8FAFC" stroke="#38BDF8" stroke-width="2" filter="url(#blueGlow)"/>
    <circle cx="76" cy="115" r="4.2" fill="#F8FAFC" stroke="#38BDF8" stroke-width="2" filter="url(#blueGlow)"/>
  </g>
</svg>
